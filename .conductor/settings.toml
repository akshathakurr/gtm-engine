"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

# Shared Conductor config. This file (.conductor/settings.toml) is committed, so
# fresh workspaces branch from origin and read it. Per-machine overrides go in
# .conductor/settings.local.toml (gitignored).

# Parse the copied .env so agents see the same keys as the main checkout.
environment_variable_files = [".env"]

# Default every Conductor run to the keyless ChatGPT/Codex brain. .env (copied in
# setup) already sets this and wins via load_dotenv(override=True); this is a
# belt-and-suspenders default in case the .env copy is ever skipped.
[environment_variables]
GTM_BRAIN = "codex"

[scripts]
run_mode = "concurrent"

# Runs once when a new workspace is created. A fresh git worktree has the tracked
# code but NOT the gitignored .env or context/*.md, and no installed deps — so we
# provision all three here.
setup = """
set -e

# 1) Isolated Python env + dependencies.
python3 -m venv .venv
.venv/bin/pip install -q -r requirements.txt

# 2) Copy the gitignored secrets + business context from the main checkout.
#    Conductor exports $CONDUCTOR_ROOT_PATH = the source repo root; fall back to
#    the main git worktree if it's ever unset.
SRC="${CONDUCTOR_ROOT_PATH:-$(git worktree list --porcelain | awk '/^worktree /{print $2; exit}')}"
[ -f "$SRC/.env" ] && cp "$SRC/.env" .env || echo "warn: no .env found at $SRC"
# Copy the ENTIRE context/ tree, not just the top-level *.md — multi-project
# setups keep per-project context in subfolders (e.g. context/luffy/context.md)
# selected via GTM_CONTEXT_DIR. A flat `cp context/*.md` skipped those subfolders,
# so a fresh workspace fell back to the default context even when a project was
# requested. `cp -r` brings the subfolders along.
if [ -d "$SRC/context" ]; then
  cp -r "$SRC/context" .
else
  echo "warn: no context/ dir at $SRC"
fi

echo "setup complete — venv ready, .env + context copied from $SRC"
echo "note: run workflows with .venv/bin/python (venv activation does not persist past setup)"
"""
